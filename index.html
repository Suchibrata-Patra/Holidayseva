<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Holidayseva Booking Calendar</title>

    <!-- Load design tokens FIRST -->
    <link rel="stylesheet" href="/UI/Foundation/colors.css">

    <!-- Then load calendar styles -->
    <link rel="stylesheet" href="/UI/Forms/calendar/calendar.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Hotel Booking Calendar</h2>

        <!-- Calendar Component -->
        <div class="calendar-wrapper" id="bookingCal">

            <div class="calendar-mode-toggle">
                <button class="calendar-mode-btn active" data-action="mode" data-mode="dates">Dates</button>

                <button class="calendar-mode-btn" data-action="mode" data-mode="flexible">Flexible</button>
            </div>

            <div class="calendar-months"></div>

            <div class="calendar-footer">
                <button class="flex-pill active-pill" data-action="flex" data-flex="exact">Exact dates</button>

                <button class="flex-pill" data-action="flex" data-flex="1">± 1 day</button>

                <button class="flex-pill" data-action="flex" data-flex="7">± 7 days</button>
            </div>

        </div>

        <br>

        <button onclick="getRange()">Get Selected Range</button>
        <button onclick="clearRange()">Clear</button>
        <button onclick="setDemoRange()">Set Demo Range</button>

    </div>

    <!-- Calendar Script -->
    <script src="/UI/Forms/calendar/calendar.js"></script>

    <script>

        let cal = new HolidaysevaCalendar('#bookingCal', {

            minDate: new Date(),

            months: 2,

            disabledDates: [
                "2026-03-25",
                "2026-03-26",
                "2026-04-10"
            ],

            onChange: ({ start, end }) => {
                console.log("Check-in:", start)
                console.log("Check-out:", end)
                alert("Selected range:\n" + start + " → " + end)
            },

            onMonthChange: ({ year, month }) => {
                console.log("Viewing month:", year, month)
            }

        })

        function getRange() {
            const range = cal.getRange()
            console.log(range)
            alert(JSON.stringify(range))
        }

        function clearRange() {
            cal.clear()
        }

        function setDemoRange() {
            cal.setRange(
                new Date(2026, 2, 15),
                new Date(2026, 2, 20)
            )
        }

    </script>

</body>

</html>
