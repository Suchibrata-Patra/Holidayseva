<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Liquid Glass Controls</title>

    <style>
        :root {
            --control-h: 48px;
            --font: 14px;
        }

        body.xl {
            --control-h: 74px;
            --font: 18px;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
            background:
                radial-gradient(circle at 30% 30%, #6aa7ff, #101833 70%);
            color: white;
        }

        /* container */

        .panel {
            padding: 32px;
            width: 420px;
            border-radius: 26px;

            backdrop-filter: blur(60px) saturate(200%);
            background: rgba(255, 255, 255, 0.06);

            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -8px 20px rgba(255, 255, 255, 0.06),
                0 30px 80px rgba(0, 0, 0, 0.45);
        }

        /* soft glass base */

        .glass {
            position: relative;
            border-radius: 999px;
            overflow: hidden;

            backdrop-filter: blur(40px) saturate(180%);
            background: linear-gradient(140deg,
                    rgba(255, 255, 255, 0.18),
                    rgba(255, 255, 255, 0.02));

            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.25),
                inset 0 -10px 20px rgba(255, 255, 255, 0.04),
                0 10px 30px rgba(0, 0, 0, 0.4);
        }

        /* moving highlight */

        .glass::after {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(circle at var(--x) var(--y),
                    rgba(255, 255, 255, 0.35),
                    transparent 40%);
            opacity: .6;
            pointer-events: none;
        }

        /* slider */

        .slider {
            height: var(--control-h);
            display: flex;
            align-items: center;
            padding: 0 16px;
            margin-bottom: 22px;
        }

        .slider input {
            width: 100%;
            appearance: none;
            background: transparent;
        }

        .slider input::-webkit-slider-thumb {
            appearance: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;

            background: linear-gradient(160deg,
                    #ffffff,
                    #cfdcff);

            box-shadow:
                inset 0 1px 3px white,
                0 6px 16px rgba(0, 0, 0, .35);

            cursor: pointer;
        }

        /* segmented control */

        .segmented {
            display: flex;
            height: var(--control-h);
            margin-bottom: 22px;
        }

        .segmented button {
            flex: 1;
            border: none;
            background: transparent;
            color: white;
            font-size: var(--font);
            cursor: pointer;
            transition: .35s;
        }

        .segmented button.active {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
        }

        /* replay */

        .replay {
            height: var(--control-h);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: var(--font);
            cursor: pointer;
        }

        /* toggle */

        .toggle {
            margin-top: 22px;
            opacity: .8;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="panel">

        <div class="slider glass">
            <input type="range" value="50">
        </div>

        <div class="segmented glass">
            <button class="active">Replay</button>
            <button>Loop</button>
            <button>Stop</button>
        </div>

        <div class="replay glass" id="replayBtn">
            ⟲ Replay
        </div>

        <div class="toggle" id="toggleSize">
            Toggle Extra-Large
        </div>

    </div>

    <script>

        /* segmented */

        document.querySelectorAll(".segmented button").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".segmented button")
                    .forEach(b => b.classList.remove("active"))
                btn.classList.add("active")
            }
        })

        /* replay animation */

        const replay = document.getElementById("replayBtn")

        replay.onclick = () => {
            replay.animate([
                { transform: "rotate(0)" },
                { transform: "rotate(-360deg)" }
            ], { duration: 800 })
        }

        /* size toggle */

        document.getElementById("toggleSize")
            .onclick = () => document.body.classList.toggle("xl")

        /* liquid highlight */

        document.addEventListener("mousemove", e => {
            let x = e.clientX / window.innerWidth * 100 + "%"
            let y = e.clientY / window.innerHeight * 100 + "%"

            document.querySelectorAll(".glass").forEach(g => {
                g.style.setProperty("--x", x)
                g.style.setProperty("--y", y)
            })
        })

    </script>

</body>

</html>
