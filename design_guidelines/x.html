<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/design_guidelines/Components/toggle.css">
</head>

<body>

    <div class="toggle" role="switch" aria-checked="false" tabindex="0" aria-label="Enable notifications">
        <div class="toggle-circle"></div>
    </div>

    <script src="/design_guidelines/JS/components.js"></script>
    <script>
        document.querySelector('.toggle').addEventListener('toggle-change', (e) => {
            console.log(e.detail.state); // "on" or "off"
        });
    </script>

</body>

</html>
