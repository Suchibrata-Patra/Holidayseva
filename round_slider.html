<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Month Slider</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet"/>
<style>
  /* ─── Page shell (remove when embedding) ─── */
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ebe8e3;
    font-family: 'DM Sans', sans-serif;
  }

  /* ══════════════════════════════════════════
     COMPONENT STYLES — self-contained,
     scope everything under .month-slider-root
  ══════════════════════════════════════════ */
  .month-slider-root {
    --ms-size:        320px;   /* overall diameter — override freely */
    --ms-accent:      #E8175A;
    --ms-bg:          #ebe8e3;
    --ms-font:        'DM Sans', sans-serif;

    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    font-family: var(--ms-font);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .month-slider-root .ms-wrap {
    position: relative;
    width: var(--ms-size);
    height: var(--ms-size);
    flex-shrink: 0;
  }

  .month-slider-root canvas {
    display: block;
    cursor: pointer;
    /* no border-radius — canvas is square, ring drawn in JS */
  }

  .month-slider-root .ms-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    line-height: 1;
  }

  .month-slider-root .ms-num {
    display: inline-block;
    font-size: calc(var(--ms-size) * 0.175);
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.04em;
    line-height: 1;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .month-slider-root .ms-num.pop { transform: scale(1.13); }

  .month-slider-root .ms-sub {
    display: block;
    font-size: calc(var(--ms-size) * 0.058);
    font-weight: 400;
    color: #999;
    letter-spacing: 0.04em;
    margin-top: calc(var(--ms-size) * 0.018);
  }

  .month-slider-root .ms-month {
    font-size: calc(var(--ms-size) * 0.062);
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--ms-accent);
    text-transform: uppercase;
    min-height: 1.4em;
    text-align: center;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     COMPONENT ROOT  —  drop this anywhere on your page
     Customise via data attributes:
       data-min="1"       minimum value  (default 1)
       data-max="12"      maximum value  (default 12)
       data-value="1"     initial value  (default min)
       data-size="320"    diameter in px (default 320)
═══════════════════════════════════════════════════ -->
<div class="month-slider-root"
     id="mySlider"
     data-min="1"
     data-max="12"
     data-value="1"
     data-size="320">
</div>

<script>
(function () {
  'use strict';

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  /* ─── helper: short-circuit angle wrap ─────────────────
     Returns the angular difference (−π … +π) between two angles
  ──────────────────────────────────────────────────────── */
  function angleDiff(a, b) {
    let d = b - a;
    while (d >  Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    return d;
  }

  /* ─── mount function — call on any .month-slider-root ── */
  function mountSlider(root) {
    // Read config
    const MIN    = parseInt(root.dataset.min   || '1',   10);
    const MAX    = parseInt(root.dataset.max   || '12',  10);
    const INIT   = parseInt(root.dataset.value || String(MIN), 10);
    const SIZE   = parseInt(root.dataset.size  || '320', 10);
    const STEPS  = MAX - MIN;          // number of intervals

    // Override CSS variable so label sizes scale too
    root.style.setProperty('--ms-size', SIZE + 'px');

    // Build DOM
    root.innerHTML = `
      <div class="ms-wrap">
        <canvas id="ms-canvas-${SIZE}"></canvas>
        <div class="ms-center">
          <span class="ms-num">${INIT}</span>
          <span class="ms-sub">month${INIT !== 1 ? 's' : ''}</span>
        </div>
      </div>
      <div class="ms-month">${MONTHS[INIT - 1] || ''}</div>`;

    const wrap    = root.querySelector('.ms-wrap');
    const canvas  = root.querySelector('canvas');
    const numEl   = root.querySelector('.ms-num');
    const subEl   = root.querySelector('.ms-sub');
    const labelEl = root.querySelector('.ms-month');

    const DPR = window.devicePixelRatio || 1;
    canvas.width        = SIZE * DPR;
    canvas.height       = SIZE * DPR;
    canvas.style.width  = SIZE + 'px';
    canvas.style.height = SIZE + 'px';
    wrap.style.width    = SIZE + 'px';
    wrap.style.height   = SIZE + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    // Layout constants
    const CX       = SIZE / 2;
    const CY       = SIZE / 2;
    const OUTER_R  = SIZE * 0.455;
    const INNER_R  = SIZE * 0.285;
    const TRACK_R  = SIZE * 0.370;
    const TRACK_W  = SIZE * 0.082;
    const HANDLE_R = SIZE * 0.052;
    const DOT_ORB  = SIZE * 0.308;
    const DOT_SZ   = SIZE * 0.009;

    // Arc geometry: 12 o'clock = -π/2, sweep 330° CW
    const START_RAD  = -Math.PI / 2;
    const SWEEP_RAD  = (330 / 180) * Math.PI;

    function valueToRad(v) {
      return START_RAD + ((v - MIN) / STEPS) * SWEEP_RAD;
    }
    function radToValue(rad) {
      // rel is always 0..SWEEP_RAD (clamped before calling)
      const rel = rad - START_RAD;
      return MIN + Math.round((rel / SWEEP_RAD) * STEPS);
    }

    // ── Haptics ────────────────────────────────────────
    // Vibration API  — works on Android Chrome & many mobile browsers.
    // iOS Safari requires a UserGesture AND "Settings > Sounds & Haptics"
    // to be on; it uses the Taptic Engine via a silent AudioContext trick
    // as a fallback so we try both paths.
    let audioCtx = null;

    function iosHapticTick() {
      // iOS doesn't support navigator.vibrate, but a near-silent 1-sample
      // AudioContext click through the speaker triggers the Taptic Engine
      // on devices where "System Haptics" is enabled.
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
        buf.getChannelData(0)[0] = 0.001; // almost silent
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start(0);
      } catch (_) {}
    }

    function haptic() {
      // 1. Vibration API (Android / some browsers)
      if (navigator.vibrate) {
        navigator.vibrate(8); // 8 ms — short crisp click
        return;
      }
      // 2. iOS AudioContext fallback
      iosHapticTick();
    }

    // Unlock AudioContext on first touch (required by browsers)
    function unlockAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      canvas.removeEventListener('touchstart', unlockAudio);
      canvas.removeEventListener('mousedown',  unlockAudio);
    }
    canvas.addEventListener('touchstart', unlockAudio, { once: true });
    canvas.addEventListener('mousedown',  unlockAudio, { once: true });

    // ── State ──────────────────────────────────────────
    let value      = INIT;
    let smoothRad  = valueToRad(INIT);
    let targetRad  = valueToRad(INIT);
    let isDragging = false;
    let rafId      = null;
    let lastValue  = INIT;

    // Accumulator: total angle turned from drag-start, avoids wrap glitches
    let dragStartAngle = 0;   // raw Math.atan2 angle when pointer went down
    let dragStartRad   = valueToRad(INIT); // arc angle at drag start

    // ── Draw helpers ───────────────────────────────────
    function drawRing() {
      const g = ctx.createRadialGradient(
        CX - SIZE*0.08, CY - SIZE*0.10, SIZE*0.04,
        CX, CY, OUTER_R);
      g.addColorStop(0, '#f8f5f1');
      g.addColorStop(1, '#d9d5cf');
      ctx.beginPath();
      ctx.arc(CX, CY, OUTER_R, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();

      // Highlight
      ctx.save();
      ctx.shadowColor   = 'rgba(255,255,255,0.95)';
      ctx.shadowBlur    = SIZE * 0.07;
      ctx.shadowOffsetX = -SIZE * 0.025;
      ctx.shadowOffsetY = -SIZE * 0.025;
      ctx.beginPath();
      ctx.arc(CX, CY, OUTER_R - 1, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.01)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      // Depth shadow
      ctx.save();
      ctx.shadowColor   = 'rgba(150,140,128,0.5)';
      ctx.shadowBlur    = SIZE * 0.08;
      ctx.shadowOffsetX = SIZE * 0.03;
      ctx.shadowOffsetY = SIZE * 0.03;
      ctx.beginPath();
      ctx.arc(CX, CY, OUTER_R - 1, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,0,0,0.01)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawTicks(currentValue) {
      // Total dots = MAX (one per possible month/step position)
      // Dots up to currentValue are lit (accent colour), rest are grey
      const totalDots = MAX;
      for (let i = 0; i < totalDots; i++) {
        // Spread dots evenly around full 360° like a clock face
        const a = (i / totalDots) * Math.PI * 2 - Math.PI / 2;
        const x = CX + Math.cos(a) * DOT_ORB;
        const y = CY + Math.sin(a) * DOT_ORB;

        // Which step does this dot correspond to?
        // dot i=0 → top (month 1 position), i goes CW
        const dotStep = i; // 0-indexed

        ctx.beginPath();
        ctx.arc(x, y, DOT_SZ, 0, Math.PI*2);

        // Light up dots that are "filled" by current value
        const filledCount = currentValue - MIN; // 0-indexed count of filled steps
        ctx.fillStyle = dotStep < filledCount
          ? 'rgba(232,23,90,0.35)'
          : 'rgba(165,157,147,0.45)';
        ctx.fill();
      }
    }

    function drawInner() {
      const g = ctx.createRadialGradient(
        CX - SIZE*0.04, CY - SIZE*0.05, SIZE*0.01,
        CX, CY, INNER_R);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(1, '#f2eeea');
      ctx.beginPath();
      ctx.arc(CX, CY, INNER_R, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(CX, CY, INNER_R, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = SIZE * 0.005;
      ctx.stroke();
    }

    function drawArc(rad) {
      const arcEnd = rad;
      if (arcEnd <= START_RAD + 0.005) return;

      // Glow
      ctx.save();
      ctx.lineCap     = 'round';
      ctx.lineWidth   = TRACK_W * 1.8;
      ctx.strokeStyle = 'rgba(232,23,90,0.22)';
      ctx.filter      = `blur(${(SIZE * 0.022).toFixed(1)}px)`;
      ctx.beginPath();
      ctx.arc(CX, CY, TRACK_R, START_RAD, arcEnd, false);
      ctx.stroke();
      ctx.restore();

      // Solid arc
      const sx = CX + Math.cos(START_RAD) * TRACK_R;
      const sy = CY + Math.sin(START_RAD) * TRACK_R;
      const ex = CX + Math.cos(arcEnd)    * TRACK_R;
      const ey = CY + Math.sin(arcEnd)    * TRACK_R;
      const ag = ctx.createLinearGradient(sx, sy, ex, ey);
      ag.addColorStop(0, '#FF6090');
      ag.addColorStop(1, '#C8114A');

      ctx.save();
      ctx.lineCap     = 'round';
      ctx.lineWidth   = TRACK_W;
      ctx.strokeStyle = ag;
      ctx.beginPath();
      ctx.arc(CX, CY, TRACK_R, START_RAD, arcEnd, false);
      ctx.stroke();
      ctx.restore();
    }

    function drawHandle(rad) {
      const hx = CX + Math.cos(rad) * TRACK_R;
      const hy = CY + Math.sin(rad) * TRACK_R;

      ctx.save();
      ctx.shadowColor   = 'rgba(0,0,0,0.22)';
      ctx.shadowBlur    = SIZE * 0.045;
      ctx.shadowOffsetY = SIZE * 0.012;
      ctx.beginPath();
      ctx.arc(hx, hy, HANDLE_R, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();

      const hg = ctx.createRadialGradient(
        hx - HANDLE_R*0.28, hy - HANDLE_R*0.32, HANDLE_R*0.04,
        hx, hy, HANDLE_R);
      hg.addColorStop(0, '#ffffff');
      hg.addColorStop(1, '#eeebe8');
      ctx.beginPath();
      ctx.arc(hx, hy, HANDLE_R, 0, Math.PI*2);
      ctx.fillStyle = hg;
      ctx.fill();
    }

    function draw(rad, val) {
      ctx.clearRect(0, 0, SIZE, SIZE);
      drawRing();
      drawTicks(val);
      drawInner();
      drawArc(rad);
      drawHandle(rad);
    }

    // ── Animation ──────────────────────────────────────
    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      const diff = targetRad - smoothRad;
      if (Math.abs(diff) < 0.0006) {
        smoothRad = targetRad;
        draw(smoothRad, value);
        rafId = null;
        return;
      }
      smoothRad = lerp(smoothRad, targetRad, isDragging ? 0.40 : 0.18);
      draw(smoothRad, value);
      rafId = requestAnimationFrame(tick);
    }

    function kick() {
      if (!rafId) rafId = requestAnimationFrame(tick);
    }

    // ── Value commit ───────────────────────────────────
    function commitRad(newRad) {
      // Hard clamp — NEVER outside [START_RAD, START_RAD + SWEEP_RAD]
      newRad = Math.max(START_RAD, Math.min(START_RAD + SWEEP_RAD, newRad));
      targetRad = newRad;

      const v = radToValue(newRad);
      const clamped = Math.max(MIN, Math.min(MAX, v));
      if (clamped !== lastValue) {
        lastValue = clamped;
        value = clamped;
        numEl.textContent  = clamped;
        subEl.textContent  = 'month' + (clamped !== 1 ? 's' : '');
        labelEl.textContent = MONTHS[clamped - 1] || '';

        haptic();

        numEl.classList.remove('pop');
        requestAnimationFrame(() => numEl.classList.add('pop'));
        setTimeout(() => numEl.classList.remove('pop'), 200);
      }
      kick();
    }

    // ── Pointer helpers ────────────────────────────────
    function rawAngle(e) {
      const rect = canvas.getBoundingClientRect();
      const pt   = e.touches ? e.touches[0] : e;
      return Math.atan2(
        pt.clientY - rect.top  - SIZE/2,
        pt.clientX - rect.left - SIZE/2
      ); // range −π … +π
    }

    // ── Pointer events ─────────────────────────────────
    function onStart(e) {
      isDragging     = true;
      dragStartAngle = rawAngle(e);
      dragStartRad   = targetRad;
      e.preventDefault();
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();

      const currentAngle = rawAngle(e);

      // Delta from where the drag began — handles 0/2π wrap cleanly
      const delta = angleDiff(dragStartAngle, currentAngle);

      // New arc angle = start position + how much we've rotated
      const newRad = dragStartRad + delta;
      commitRad(newRad);
    }

    function onEnd() { isDragging = false; }

    canvas.addEventListener('mousedown',  onStart);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('mousemove',  onMove);
    window.addEventListener('touchmove',  onMove,  { passive: false });
    window.addEventListener('mouseup',    onEnd);
    window.addEventListener('touchend',   onEnd);

    // Initial render
    draw(smoothRad, value);
  }

  // ── Auto-mount all roots on page ──────────────────────
  document.querySelectorAll('.month-slider-root').forEach(mountSlider);
})();
</script>
</body>
</html>
