<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Month Slider</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ebe8e3;
    font-family: 'DM Sans', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .slider-wrap {
    position: relative;
  }

  canvas {
    display: block;
    cursor: pointer;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .num {
    font-size: clamp(3.2rem, 13vw, 5rem);
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
    letter-spacing: -3px;
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: inline-block;
  }

  .num.pop { transform: scale(1.13); }

  .sub {
    font-size: clamp(0.8rem, 2.8vw, 1rem);
    font-weight: 400;
    color: #999;
    letter-spacing: 0.04em;
    margin-top: 6px;
  }

  .month-label {
    font-size: clamp(0.85rem, 3vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #E8175A;
    text-transform: uppercase;
    min-height: 1.4em;
  }
</style>
</head>
<body>

<div class="scene">
  <div class="slider-wrap" id="wrap">
    <canvas id="c"></canvas>
    <div class="center">
      <div class="num" id="num">1</div>
      <div class="sub">month</div>
    </div>
  </div>
  <div class="month-label" id="mlabel">January</div>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const numEl  = document.getElementById('num');
const mlabel = document.getElementById('mlabel');
const wrap   = document.getElementById('wrap');

// ── Sizing ───────────────────────────────────────────────
const SIZE  = Math.min(320, window.innerWidth * 0.82);
const DPR   = window.devicePixelRatio || 1;
canvas.width        = SIZE * DPR;
canvas.height       = SIZE * DPR;
canvas.style.width  = SIZE + 'px';
canvas.style.height = SIZE + 'px';
ctx.scale(DPR, DPR);
wrap.style.width  = SIZE + 'px';
wrap.style.height = SIZE + 'px';

const CX       = SIZE / 2;
const CY       = SIZE / 2;
const OUTER_R  = SIZE * 0.455;
const INNER_R  = SIZE * 0.285;
const TRACK_R  = SIZE * 0.370;
const TRACK_W  = SIZE * 0.082;
const HANDLE_R = SIZE * 0.052;
const DOT_ORB  = SIZE * 0.308;
const DOT_CNT  = 52;
const DOT_SZ   = SIZE * 0.008;

// ── Arc geometry ─────────────────────────────────────────
// 12 o'clock = -π/2 in canvas coords (x right, y down)
const START_RAD = -Math.PI / 2;           // -90° = top
const SWEEP_RAD = (330 / 180) * Math.PI;  // 330° clockwise

function valueToRad(v) {
  return START_RAD + ((v - 1) / 11) * SWEEP_RAD;
}

function radToValue(rad) {
  let rel = ((rad - START_RAD) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (rel > SWEEP_RAD + 0.3) rel = rel > Math.PI ? 0 : SWEEP_RAD;
  rel = Math.max(0, Math.min(SWEEP_RAD, rel));
  return Math.round((rel / SWEEP_RAD) * 11) + 1;
}

// ── State ────────────────────────────────────────────────
let value        = 1;
let smoothRad    = START_RAD;
let targetRad    = START_RAD;
let isDragging   = false;
let rafId        = null;
let lastValue    = 1;

// ── Drawing ───────────────────────────────────────────────
function drawRing() {
  // Main disc gradient
  const g = ctx.createRadialGradient(CX - SIZE*0.08, CY - SIZE*0.1, SIZE*0.04, CX, CY, OUTER_R);
  g.addColorStop(0, '#f8f5f1');
  g.addColorStop(1, '#d9d5cf');
  ctx.beginPath();
  ctx.arc(CX, CY, OUTER_R, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();

  // Top-left highlight
  ctx.save();
  ctx.shadowColor   = 'rgba(255,255,255,1)';
  ctx.shadowBlur    = SIZE * 0.07;
  ctx.shadowOffsetX = -SIZE * 0.025;
  ctx.shadowOffsetY = -SIZE * 0.025;
  ctx.beginPath();
  ctx.arc(CX, CY, OUTER_R - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.01)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Bottom-right shadow
  ctx.save();
  ctx.shadowColor   = 'rgba(150,140,128,0.5)';
  ctx.shadowBlur    = SIZE * 0.08;
  ctx.shadowOffsetX = SIZE * 0.03;
  ctx.shadowOffsetY = SIZE * 0.03;
  ctx.beginPath();
  ctx.arc(CX, CY, OUTER_R - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.01)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawTicks() {
  for (let i = 0; i < DOT_CNT; i++) {
    const a = (i / DOT_CNT) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(
      CX + Math.cos(a) * DOT_ORB,
      CY + Math.sin(a) * DOT_ORB,
      DOT_SZ, 0, Math.PI * 2
    );
    ctx.fillStyle = 'rgba(165,157,147,0.45)';
    ctx.fill();
  }
}

function drawInner() {
  const g = ctx.createRadialGradient(CX - SIZE*0.04, CY - SIZE*0.05, SIZE*0.01, CX, CY, INNER_R);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(1, '#f2eeea');
  ctx.beginPath();
  ctx.arc(CX, CY, INNER_R, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(CX, CY, INNER_R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = SIZE * 0.005;
  ctx.stroke();
}

function drawArc(rad) {
  if (rad <= START_RAD + 0.001) return;

  // Soft glow (blurred pass)
  ctx.save();
  ctx.lineCap     = 'round';
  ctx.lineWidth   = TRACK_W * 1.8;
  ctx.strokeStyle = 'rgba(232,23,90,0.22)';
  ctx.filter      = `blur(${(SIZE * 0.022).toFixed(1)}px)`;
  ctx.beginPath();
  ctx.arc(CX, CY, TRACK_R, START_RAD, rad, false);
  ctx.stroke();
  ctx.restore();

  // Solid arc
  const sx = CX + Math.cos(START_RAD) * TRACK_R;
  const sy = CY + Math.sin(START_RAD) * TRACK_R;
  const ex = CX + Math.cos(rad) * TRACK_R;
  const ey = CY + Math.sin(rad) * TRACK_R;
  const ag = ctx.createLinearGradient(sx, sy, ex, ey);
  ag.addColorStop(0, '#FF6090');
  ag.addColorStop(1, '#C8114A');

  ctx.save();
  ctx.lineCap     = 'round';
  ctx.lineWidth   = TRACK_W;
  ctx.strokeStyle = ag;
  ctx.beginPath();
  ctx.arc(CX, CY, TRACK_R, START_RAD, rad, false);
  ctx.stroke();
  ctx.restore();
}

function drawHandle(rad) {
  const hx = CX + Math.cos(rad) * TRACK_R;
  const hy = CY + Math.sin(rad) * TRACK_R;

  // Drop shadow
  ctx.save();
  ctx.shadowColor   = 'rgba(0,0,0,0.22)';
  ctx.shadowBlur    = SIZE * 0.045;
  ctx.shadowOffsetY = SIZE * 0.012;
  ctx.beginPath();
  ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();

  // Gloss
  const hg = ctx.createRadialGradient(hx - HANDLE_R*0.28, hy - HANDLE_R*0.32, HANDLE_R*0.04, hx, hy, HANDLE_R);
  hg.addColorStop(0, '#ffffff');
  hg.addColorStop(1, '#eeebe8');
  ctx.beginPath();
  ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2);
  ctx.fillStyle = hg;
  ctx.fill();
}

function draw(rad) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  drawRing();
  drawTicks();
  drawInner();
  drawArc(rad);
  drawHandle(rad);
}

// ── Animation ─────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function tick() {
  const diff = targetRad - smoothRad;
  if (Math.abs(diff) < 0.0008) {
    smoothRad = targetRad;
    draw(smoothRad);
    rafId = null;
    return;
  }
  smoothRad = lerp(smoothRad, targetRad, isDragging ? 0.42 : 0.18);
  draw(smoothRad);
  rafId = requestAnimationFrame(tick);
}

function kick() { if (!rafId) rafId = requestAnimationFrame(tick); }

// ── Value commit ──────────────────────────────────────────
function setTarget(rad) {
  // Clamp into valid arc range
  let rel = ((rad - START_RAD) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  if (rel > SWEEP_RAD + 0.25) {
    rel = rel > Math.PI ? 0 : SWEEP_RAD;
  }
  rel = Math.max(0, Math.min(SWEEP_RAD, rel));
  targetRad = START_RAD + rel;

  const v = radToValue(targetRad);
  if (v !== lastValue) {
    lastValue = v;
    value = v;
    numEl.textContent = v;
    mlabel.textContent = MONTHS[v - 1];
    numEl.classList.remove('pop');
    requestAnimationFrame(() => numEl.classList.add('pop'));
    setTimeout(() => numEl.classList.remove('pop'), 200);
  }
  kick();
}

// ── Pointer ───────────────────────────────────────────────
function getAngle(e) {
  const rect = canvas.getBoundingClientRect();
  const pt   = e.touches ? e.touches[0] : e;
  const dx   = pt.clientX - rect.left - SIZE/2;
  const dy   = pt.clientY - rect.top  - SIZE/2;
  return Math.atan2(dy, dx);   // -π..π, 0=right, -π/2=top
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  setTarget(getAngle(e));
});
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  e.preventDefault();
  setTarget(getAngle(e));
}, { passive: false });

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  setTarget(getAngle(e));
});
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  setTarget(getAngle(e));
}, { passive: false });

window.addEventListener('mouseup',  () => { isDragging = false; });
window.addEventListener('touchend', () => { isDragging = false; });

// ── Boot ──────────────────────────────────────────────────
draw(START_RAD);
</script>
</body>
</html>
